<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang Chủ | Trắc Nghiệm CSDL</title>
<meta name="description" content="Ôn tập trắc nghiệm Cơ sở dữ liệu - 356 câu hỏi tổng hợp">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========== HOME ========== -->

<div id="home-screen" class="screen active">
  <div class="logo-icon">🗄️</div>
  <h1 class="home-title">Trắc Nghiệm CSDL</h1>
  <p class="home-sub">Cơ Sở Dữ Liệu – Nguyễn Hồng Phương</p>
  <p class="home-author">cuuduongthancong.com</p>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num">356</div>
      <div class="stat-lbl">Câu hỏi</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">8</div>
      <div class="stat-lbl">Chủ đề</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">4</div>
      <div class="stat-lbl">Chế độ</div>
    </div>
  </div>

  <div class="mode-grid">
    <div class="mode-card selected" data-mode="practice" onclick="selectMode(this)">
      <div class="mode-icon">📚</div>
      <div class="mode-name">Luyện tập</div>
      <div class="mode-desc">Xem đáp án sau mỗi câu</div>
    </div>
    <div class="mode-card" data-mode="exam" onclick="selectMode(this)">
      <div class="mode-icon">📝</div>
      <div class="mode-name">Thi thử</div>
      <div class="mode-desc">Nộp bài xem kết quả</div>
    </div>
    <div class="mode-card" data-mode="timed" onclick="selectMode(this)">
      <div class="mode-icon">⏱️</div>
      <div class="mode-name">Giới hạn thời gian</div>
      <div class="mode-desc">60 giây mỗi câu</div>
    </div>
    <div class="mode-card" data-mode="review" onclick="selectMode(this)">
      <div class="mode-icon">🔁</div>
      <div class="mode-name">Xem lại tất cả</div>
      <div class="mode-desc">Duyệt câu hỏi và đáp án</div>
    </div>
  </div>

  <div class="settings-row">
    <label>Số câu:</label>
    <input type="number" id="num-questions" value="30" min="5" max="356" step="5">
    <label style="margin-left:1rem;">Từ câu:</label>
    <input type="number" id="start-from" value="1" min="1" max="356">
  </div>

  <button class="btn-start" onclick="startQuiz()">Bắt đầu →</button>
</div>


<script>
  let mode = 'practice';
  function selectMode(el){
    document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    mode = el.dataset.mode;
    const timerBadge = document.getElementById('timer-badge');
    if(timerBadge) {
        if(mode==='review') {
          document.getElementById('num-questions').disabled=true;
          document.getElementById('start-from').disabled=true;
        } else {
          document.getElementById('num-questions').disabled=false;
          document.getElementById('start-from').disabled=false;
        }
    }
  }

  function startQuiz(){
    const numQ = parseInt(document.getElementById('num-questions').value)||30;
    const startFrom = parseInt(document.getElementById('start-from').value)||1;
    let url = 'quiz.html?mode=' + mode + '&num=' + numQ + '&start=' + startFrom;
    window.open(url, '_blank');
  }
</script>
</body>
</html>
